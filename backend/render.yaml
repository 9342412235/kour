services:
  - type: web
    name: thekour-api
    runtime: node
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: node src/server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      # ── Set these in the Render dashboard ──
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: COOKIE_NAME
        value: thekour_token
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: CLIENT_URL
        sync: false          # e.g. https://thekour.vercel.app
      - key: CLIENT_URLS
        sync: false          # comma-separated list of all 5 Vercel URLs
      - key: API_URL
        sync: false          # e.g. https://thekour-api.onrender.com
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_CALLBACK_URL
        sync: false          # https://thekour-api.onrender.com/api/auth/google/callback
      - key: ADMIN_NAME
        value: Admin
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: OTP_EXPIRES_MIN
        value: 10
      - key: RESET_TOKEN_EXPIRES_MIN
        value: 30
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: 465
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: BACKUP_CRON
        value: "0 2 * * *"
      - key: PGSSL
        value: true
